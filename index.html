<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Make 24 Online - Pro Layout</title>
    <!-- Firebase Legacy SDKs for easy single-file CDN integration -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background-color: #f0f2f5;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 1024px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.08);
            padding: 20px;
            overflow: hidden;
        }
        .screen { display: none; }
        .screen.active { display: block; }

        /* Setup Setup/Lobby Windows centered */
        .centered-panel {
            max-width: 400px;
            margin: 40px auto;
            text-align: center;
        }

        h1 { margin: 0 0 10px 0; color: #333; font-size: 1.8rem; }
        p { color: #666; font-size: 0.95rem; margin-bottom: 20px; }
        
        input[type="text"] {
            width: 100%;
            padding: 14px;
            font-size: 1.2rem;
            border: 2px solid #ddd;
            border-radius: 10px;
            outline: none;
            text-align: center;
            margin-bottom: 15px;
        }
        input[type="text"]:focus { border-color: #7b1fa2; }

        button {
            background-color: #7b1fa2;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 1.05rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            margin: 5px 0;
            width: 100%;
            transition: background 0.15s, transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        button.secondary { background-color: #6c757d; }
        button.success { background-color: #2e7d32; }

        /* --- THREE-COLUMN GAMEPLAY LAYOUT --- */
        .game-layout {
            display: flex;
            gap: 15px;
            align-items: stretch;
            justify-content: space-between;
        }

        /* Column 1: Scoreboard Left */
        .side-scores {
            flex: 1;
            max-width: 200px;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }
        .side-scores h3 { margin: 0 0 10px 0; font-size: 1rem; color: #495057; border-bottom: 2px solid #dee2e6; padding-bottom: 5px; }
        .score-list { list-style: none; padding: 0; margin: 0; font-size: 0.95rem; }
        .score-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 8px;
            border-radius: 6px;
            margin-bottom: 4px;
            background: white;
            border: 1px solid #edf2f7;
        }
        .score-item.me { background: #e3f2fd; border-color: #90caf9; font-weight: bold; }

        /* Column 2: Main Play Area Center */
        .center-board {
            flex: 2;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-align: center;
            min-width: 280px;
        }
        .timer { font-size: 1.8rem; font-weight: bold; color: #d32f2f; margin-bottom: 5px; }
        
        .num-container { display: flex; justify-content: center; gap: 10px; margin: 15px 0; }
        .num-box { background: #f3e5f5; color: #7b1fa2; font-size: 2.2rem; font-weight: bold; width: 65px; height: 65px; line-height: 61px; border-radius: 12px; border: 2px solid #e1bee7; }

        /* Column 3: Number Pad Right */
        .side-pad {
            flex: 1.2;
            max-width: 240px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #e9ecef;
        }
        .pad-btn {
            width: 100%;
            height: 50px;
            margin: 0;
            padding: 0;
            font-size: 1.25rem;
            background-color: #ffffff;
            color: #333;
            border: 1px solid #ccc;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pad-btn:active { background-color: #e2e8f0; }
        .pad-btn.op { background-color: #fff9db; color: #f59f00; border-color: #ffe066; font-weight: bold; }
        .pad-btn.action { background-color: #e8f5e9; color: #2e7d32; border-color: #c8e6c9; font-size: 0.95rem; }
        .pad-btn.clear { background-color: #ffebee; color: #c62828; border-color: #ffcdd2; font-size: 0.95rem; }

        /* General UI Elements */
        .feedback { font-weight: bold; margin: 10px 0; font-size: 1.1rem; min-height: 26px; }
        .answer-box { padding: 12px; background: #e8f5e9; color: #2e7d32; border-radius: 10px; font-weight: bold; display: none; border: 1px solid #c8e6c9; }
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .btn-group button { margin: 0; }
        .profile-badge { font-size: 0.85rem; background: #e0f7fa; color: #006064; padding: 4px 12px; border-radius: 20px; display: inline-block; margin-bottom: 15px; font-weight: 500; }

        /* Responsive Flow For True Portrait Smartphones */
        @media (max-width: 768px) {
            body { padding: 5px; }
            .container { padding: 12px; }
            .game-layout { flex-direction: column; }
            .side-scores { max-width: 100%; order: 1; }
            .center-board { order: 2; }
            .side-pad { max-width: 100%; order: 3; grid-template-columns: repeat(4, 1fr); }
            .num-box { width: 55px; height: 55px; line-height: 51px; font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- SCREEN 0: REGISTRATION -->
    <div id="register-screen" class="screen active">
        <div class="centered-panel">
            <h1>Player Profile</h1>
            <p>Enter your profile configuration name</p>
            <input type="text" id="username-input" placeholder="Enter Nickname/Name">
            <button class="success" onclick="saveProfile()">Save & Continue</button>
        </div>
    </div>

    <!-- SCREEN 1: MENU -->
    <div id="menu-screen" class="screen">
        <div class="centered-panel">
            <div class="profile-badge" id="player-tag">Player:</div>
            <h1>Make 24 Online</h1>
            <p>Select your gameplay option</p>
            <button onclick="startSoloGame()">Solo Mode</button>
            <button class="secondary" onclick="showLobbyMenu()">Multiplayer Room</button>
            <button style="background:transparent; color:#777; font-size:0.85rem; text-decoration:underline;" onclick="editProfile()">Change Name</button>
        </div>
    </div>

    <!-- SCREEN 2: LOBBY -->
    <div id="lobby-screen" class="screen">
        <div class="centered-panel">
            <h1>Multiplayer Lobby</h1>
            <p>Initialize or step into a room environment</p>
            <button onclick="createRoom()">+ Create New Room</button>
            <div style="margin: 15px 0; font-weight: bold; color: #888;">OR</div>
            <input type="text" id="room-id-input" placeholder="4-Digit Room Code" pattern="\d*" inputmode="numeric">
            <button class="success" onclick="joinRoom()">Join Room</button>
            <button class="secondary" style="margin-top: 15px;" onclick="showScreen('menu-screen')">Back to Menu</button>
        </div>
    </div>

    <!-- SCREEN 3: GAME BOARD -->
    <div id="game-screen" class="screen">
        <div class="game-layout">
            
            <!-- LEFT: SCOREBAR COLUMN -->
            <div class="side-scores">
                <h3>🏆 Scoreboard</h3>
                <ul class="score-list" id="score-display-list">
                    <li class="score-item me"><span>You</span><span>0</span></li>
                </ul>
            </div>

            <!-- CENTER: PLAY MAT COLUMN -->
            <div class="center-board">
                <div>
                    <h1 id="game-title" style="font-size: 1.4rem; margin:0;">Game Board</h1>
                    <div id="room-display" style="color: #666; font-size: 0.85rem; margin-bottom: 5px;"></div>
                    <div class="timer" id="timer-display">05:00</div>
                </div>

                <div class="num-container">
                    <div class="num-box" id="n1" onclick="appendPad(this.innerText)">-</div>
                    <div class="num-box" id="n2" onclick="appendPad(this.innerText)">-</div>
                    <div class="num-box" id="n3" onclick="appendPad(this.innerText)">-</div>
                    <div class="num-box" id="n4" onclick="appendPad(this.innerText)">-</div>
                </div>

                <div class="input-section">
                    <input type="text" id="user-input" placeholder="Tap panel or input layout" readonly>
                    <div class="feedback" id="feedback-msg"></div>
                    <div class="answer-box" id="answer">
                        Solution: <span id="solution-text"></span>
                        <div style="font-size:0.8rem; font-style:italic; margin-top:5px;" id="refresh-countdown"></div>
                    </div>
                </div>

                <div class="btn-group">
                    <button id="next-btn" onclick="getSolvableCombination()">Next Match</button>
                    <button class="secondary" id="reveal-btn" onclick="revealAnswerAndReset()">Reveal</button>
                </div>
                <button class="secondary" style="font-size:0.9rem; padding:10px;" onclick="leaveGame()">Exit to Menu</button>
            </div>

            <!-- RIGHT: KEYPAD COLUMN -->
            <div class="side-pad">
                <button class="pad-btn op" onclick="appendPad('+')">+</button>
                <button class="pad-btn op" onclick="appendPad('-')">-</button>
                <button class="pad-btn op" onclick="appendPad('×')">×</button>
                <button class="pad-btn op" onclick="appendPad('÷')">÷</button>
                
                <button class="pad-btn op" onclick="appendPad('(')">(</button>
                <button class="pad-btn op" onclick="appendPad(')')">)</button>
                <button class="pad-btn" onclick="appendPad('7')">7</button>
                <button class="pad-btn" onclick="appendPad('8')">8</button>
                
                <button class="pad-btn" onclick="appendPad('9')">9</button>
                <button class="pad-btn" onclick="appendPad('4')">4</button>
                <button class="pad-btn" onclick="appendPad('5')">5</button>
                <button class="pad-btn" onclick="appendPad('6')">6</button>
                
                <button class="pad-btn" onclick="appendPad('1')">1</button>
                <button class="pad-btn" onclick="appendPad('2')">2</button>
                <button class="pad-btn" onclick="appendPad('3')">3</button>
                <button class="pad-btn" onclick="appendPad('0')">0</button>

                <button class="pad-btn clear" style="grid-column: span 2;" onclick="clearPad()">Clear</button>
                <button class="pad-btn action" style="grid-column: span 2;" onclick="checkUserAnswer()">Submit</button>
            </div>

        </div>
    </div>
</div>

<script>
    // --- FIREBASE CREDENTIALS ---
    const firebaseConfig = {
        apiKey: "AIzaSyBSpKz3tFMv0SyPGYdSaf-lYTYgzuP3CHw",
        authDomain: "make-24-game.firebaseapp.com",
        databaseURL: "https://make-24-game-default-rtdb.firebaseio.com",
        projectId: "make-24-game",
        storageBucket: "make-24-game.firebasestorage.app",
        messagingSenderId: "269267174455",
        appId: "1:269267174455:web:e70958fbadb2a3db28abb2",
        measurementId: "G-EDKE7XQBTP"
    };
    
    let db = null;
    if (typeof firebaseConfig !== 'undefined' && firebaseConfig.apiKey) {
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
    }

    // --- STATE PROFILES ---
    let currentSolution = "";
    let targetDigits = [];
    let timerInterval = null;
    let refreshInterval = null;
    let timeRemaining = 300; 
    let isMultiplayer = false;
    let currentRoomId = null;
    let myPlayerName = "";
    let soloScore = 0;
    let multiplayerScores = {};

    window.addEventListener('DOMContentLoaded', () => {
        const savedName = localStorage.getItem('make24_username');
        if (savedName) {
            myPlayerName = savedName;
            document.getElementById('player-tag').innerText = `👤 Player: ${myPlayerName}`;
            showScreen('menu-screen');
        }
    });

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function saveProfile() {
        const inputName = document.getElementById('username-input').value.trim();
        if (!inputName) return alert("Invalid Profile Entry Name");
        myPlayerName = inputName;
        localStorage.setItem('make24_username', myPlayerName);
        document.getElementById('player-tag').innerText = `👤 Player: ${myPlayerName}`;
        showScreen('menu-screen');
    }

    function editProfile() {
        document.getElementById('username-input').value = myPlayerName;
        showScreen('register-screen');
    }

    // --- INTERFACES: ON-SCREEN PAD INPUT HANDLERS ---
    function appendPad(val) {
        document.getElementById('user-input').value += val;
    }
    function clearPad() {
        document.getElementById('user-input').value = "";
    }

    // --- MATRIX: SOLVER MATH SYSTEM ---
    function solve24(numbers, expressions) {
        if (numbers.length === 1) return Math.abs(numbers[0] - 24) < 0.001;
        for (let i = 0; i < numbers.length; i++) {
            for (let j = 0; j < numbers.length; j++) {
                if (i === j) continue;
                let nextNums = [], nextExprs = [];
                for (let k = 0; k < numbers.length; k++) {
                    if (k !== i && k !== j) { nextNums.push(numbers[k]); nextExprs.push(expressions[k]); }
                }
                let n1 = numbers[i], n2 = numbers[j];
                let e1 = expressions[i], e2 = expressions[j];

                if (i < j) {
                    nextNums.push(n1 + n2); nextExprs.push(`(${e1} + ${e2})`);
                    if (solve24(nextNums, nextExprs)) { currentSolution = nextExprs[nextExprs.length-1]; return true; }
                    nextNums.pop(); nextExprs.pop();
                }
                nextNums.push(n1 - n2); nextExprs.push(`(${e1} - ${e2})`);
                if (solve24(nextNums, nextExprs)) { currentSolution = nextExprs[nextExprs.length-1]; return true; }
                nextNums.pop(); nextExprs.pop();
                if (i < j) {
                    nextNums.push(n1 * n2); nextExprs.push(`(${e1} × ${e2})`);
                    if (solve24(nextNums, nextExprs)) { currentSolution = nextExprs[nextExprs.length-1]; return true; }
                    nextNums.pop(); nextExprs.pop();
                }
                if (Math.abs(n2) > 0.0001) {
                    nextNums.push(n1 / n2); nextExprs.push(`(${e1} ÷ ${e2})`);
                    if (solve24(nextNums, nextExprs)) { currentSolution = nextExprs[nextExprs.length-1]; return true; }
                    nextNums.pop(); nextExprs.pop();
                }
            }
        }
        return false;
    }

    // --- GAME ENGINE FLOW SYSTEM ---
    function renderScores() {
        const listContainer = document.getElementById('score-display-list');
        listContainer.innerHTML = "";
        if (!isMultiplayer) {
            listContainer.innerHTML = `<li class="score-item me"><span>${myPlayerName}</span><span>${soloScore}</span></li>`;
        } else {
            Object.keys(multiplayerScores).sort((a,b) => multiplayerScores[b] - multiplayerScores[a]).forEach(user => {
                const isMe = user === myPlayerName ? "me" : "";
                listContainer.innerHTML += `<li class="score-item ${isMe}"><span>${user}</span><span>${multiplayerScores[user]}</span></li>`;
            });
        }
    }

    function startSoloGame() {
        isMultiplayer = false;
        soloScore = 0;
        document.getElementById('game-title').innerText = "Solo Core System";
        document.getElementById('room-display').innerText = "";
        document.getElementById('next-btn').style.display = 'inline-block';
        showScreen('game-screen');
        renderScores();
        getSolvableCombination();
    }

    function showLobbyMenu() {
        if (!db) return alert("Database missing instance linking.");
        showScreen('lobby-screen');
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeRemaining = 300; 
        updateTimerDisplay();
        timerInterval = setInterval(() => {
            timeRemaining--;
            updateTimerDisplay();
            if (timeRemaining <= 0) {
                clearInterval(timerInterval);
                document.getElementById('feedback-msg').style.color = '#d32f2f';
                document.getElementById('feedback-msg').innerText = "Match Timed Out!";
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        let m = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
        let s = (timeRemaining % 60).toString().padStart(2, '0');
        document.getElementById('timer-display').innerText = `${m}:${s}`;
    }

    function getSolvableCombination() {
        clearInterval(refreshInterval);
        if (isMultiplayer) {
            let digits = [];
            while (true) {
                digits = [Math.floor(Math.random()*10), Math.floor(Math.random()*10), Math.floor(Math.random()*10), Math.floor(Math.random()*10)];
                if (solve24([...digits], digits.map(d=>d.toString()))) break;
            }
            if (currentSolution.startsWith('(') && currentSolution.endsWith(')')) currentSolution = currentSolution.slice(1, -1);
            db.ref('rooms/' + currentRoomId).update({ digits: digits, solution: currentSolution, winner: null, status: "playing" });
            return;
        }

        while (true) {
            let digits = [Math.floor(Math.random()*10), Math.floor(Math.random()*10), Math.floor(Math.random()*10), Math.floor(Math.random()*10)];
            if (solve24([...digits], digits.map(d=>d.toString()))) {
                if (currentSolution.startsWith('(') && currentSolution.endsWith(')')) currentSolution = currentSolution.slice(1, -1);
                targetDigits = [...digits];
                setupBoardUI(digits);
                break;
            }
        }
    }

    function setupBoardUI(digits) {
        document.getElementById('n1').innerText = digits[0];
        document.getElementById('n2').innerText = digits[1];
        document.getElementById('n3').innerText = digits[2];
        document.getElementById('n4').innerText = digits[3];
        if (!isMultiplayer) document.getElementById('reveal-btn').style.display = 'inline-block';
        document.getElementById('answer').style.display = 'none';
        clearPad();
        document.getElementById('feedback-msg').innerText = "";
        startTimer();
    }

    function checkUserAnswer() {
        if (timeRemaining <= 0) return;
        const feedback = document.getElementById('feedback-msg');
        const inputRaw = document.getElementById('user-input').value;
        const userDigits = inputRaw.match(/\d/g);

        if (!userDigits || userDigits.length !== 4) {
            feedback.style.color = '#d32f2f'; feedback.innerText = "Error: Input exactly 4 digits."; return;
        }
        if ([...targetDigits].sort().join('') !== [...userDigits].map(Number).sort().join('')) {
            feedback.style.color = '#d32f2f'; feedback.innerText = "Error: Mismatched components."; return;
        }

        let jsEvalString = inputRaw.replace(/×/g, '*').replace(/÷/g, '/');
        try {
            let result = Function(`"use strict"; return (${jsEvalString})`)();
            if (Math.abs(result - 24) < 0.001) {
                if (isMultiplayer) {
                    // Update scores array safely inside transaction framework
                    db.ref('rooms/' + currentRoomId + '/scores/' + myPlayerName).transaction((currentScore) => {
                        return (currentScore || 0) + 1;
                    });
                    db.ref('rooms/' + currentRoomId).update({ winner: myPlayerName });
                } else {
                    feedback.style.color = '#2e7d32';
                    feedback.innerText = "Correct! Match Won! 🎉";
                    soloScore++;
                    renderScores();
                    clearInterval(timerInterval);
                    setTimeout(getSolvableCombination, 1500);
                }
            } else {
                feedback.style.color = '#d32f2f'; feedback.innerText = `Equals ${result}, not 24.`;
            }
        } catch (e) {
            feedback.style.color = '#d32f2f'; feedback.innerText = "Syntax evaluation error.";
        }
    }

    function revealAnswerAndReset() {
        clearInterval(timerInterval);
        document.getElementById('reveal-btn').style.display = 'none';
        document.getElementById('answer').style.display = 'block';
        document.getElementById('solution-text').innerText = currentSolution + " = 24";
        
        let refreshSecs = 10;
        const countdownDisplay = document.getElementById('refresh-countdown');
        countdownDisplay.innerText = `Refreshing board in ${refreshSecs}s...`;
        
        clearInterval(refreshInterval);
        refreshInterval = setInterval(() => {
            refreshSecs--;
            countdownDisplay.innerText = `Refreshing board in ${refreshSecs}s...`;
            if (refreshSecs <= 0) {
                clearInterval(refreshInterval);
                getSolvableCombination();
            }
        }, 1000);
    }

    // --- MULTIPLAYER CORE MATRIX CONNECTS ---
    function createRoom() {
        currentRoomId = Math.floor(1000 + Math.random() * 9000).toString(); 
        isMultiplayer = true;
        multiplayerScores = {};
        multiplayerScores[myPlayerName] = 0;

        db.ref('rooms/' + currentRoomId).set({
            status: "lobby",
            digits: [0,0,0,0],
            solution: "",
            winner: null,
            scores: multiplayerScores
        }).then(() => {
            listenToRoom();
            document.getElementById('game-title').innerText = "Multiplayer Arena";
            document.getElementById('room-display').innerText = `Room Code: ${currentRoomId} (Host)`;
            document.getElementById('next-btn').style.display = 'inline-block';
            document.getElementById('reveal-btn').style.display = 'none'; 
            showScreen('game-screen');
            getSolvableCombination();
        });
    }

    function joinRoom() {
        let inputCode = document.getElementById('room-id-input').value.trim();
        if (!inputCode) return;
        
        db.ref('rooms/' + inputCode).once('value', snapshot => {
            if (snapshot.exists()) {
                currentRoomId = inputCode;
                isMultiplayer = true;
                
                // Add self to the room scores register safely
                db.ref('rooms/' + currentRoomId + '/scores/' + myPlayerName).set(0);
                
                listenToRoom();
                document.getElementById('game-title').innerText = "Multiplayer Match";
                document.getElementById('room-display').innerText = `Room Code: ${currentRoomId} (Guest)`;
                document.getElementById('next-btn').style.display = 'none'; 
                document.getElementById('reveal-btn').style.display = 'none';
                showScreen('game-screen');
            } else {
                alert("Target active matching node environment array mismatch.");
            }
        });
    }

    function listenToRoom() {
        db.ref('rooms/' + currentRoomId).on('value', snapshot => {
            const data = snapshot.val();
            if (!data) return;

            targetDigits = data.digits;
            currentSolution = data.solution;
            if (data.scores) {
                multiplayerScores = data.scores;
                renderScores();
            }

            if (document.getElementById('n1').innerText !== String(targetDigits[0])) {
                setupBoardUI(targetDigits);
            }

            if (data.winner) {
                clearInterval(timerInterval);
                const feedback = document.getElementById('feedback-msg');
                if (data.winner === myPlayerName) {
                    feedback.style.color = '#2e7d32';
                    feedback.innerText = "You Won this Match! 🏆";
                } else {
                    feedback.style.color = '#d32f2f';
                    feedback.innerText = `Winner: ${data.winner}`;
                }
                document.getElementById('answer').style.display = 'block';
                document.getElementById('solution-text').innerText = currentSolution + " = 24";
                document.getElementById('refresh-countdown').innerText = "Waiting for host step action...";
            }
        });
    }

    function leaveGame() {
        clearInterval(timerInterval);
        clearInterval(refreshInterval);
        if (isMultiplayer && currentRoomId) {
            db.ref('rooms/' + currentRoomId).off();
        }
        showScreen('menu-screen');
    }
</script>
</body>
</html>
