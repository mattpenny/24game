<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Make 24 Online - Kids Edition</title>
    <!-- Firebase Legacy SDKs for easy single-file CDN integration -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Fredoka One', 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: radial-gradient(circle, #f3e5f5 0%, #e1bee7 100%);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
        }
        
        /* Global App Title Header */
        .app-main-header {
            text-align: center;
            font-size: 2.8rem;
            font-weight: 900;
            color: #9c27b0;
            text-shadow: 3px 3px 0px #fff, 5px 5px 0px #ba68c8;
            margin: 5px 0 15px 0;
            letter-spacing: 1px;
        }

        /* Fluid layout base directly using the screen real estate */
        .app-workspace {
            width: 100%;
            max-width: 1100px;
        }

        .screen { display: none; }
        .screen.active { display: block; }

        /* Setup Windows centered */
        .centered-panel {
            max-width: 400px;
            margin: 30px auto;
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 24px;
            border: 4px solid #ce93d8;
            box-shadow: 0 8px 0px #ce93d8;
        }

        h1 { margin: 0 0 10px 0; color: #4a148c; font-size: 1.8rem; }
        p { color: #6a1b9a; font-size: 1rem; margin-bottom: 20px; font-weight: bold; }
        
        input[type="text"] {
            width: 100%;
            padding: 14px;
            font-size: 1.3rem;
            border: 3px solid #e1bee7;
            border-radius: 16px;
            outline: none;
            text-align: center;
            margin-bottom: 18px;
            background-color: #fdf6ff;
            color: #4a148c;
            font-weight: bold;
        }
        input[type="text"]:focus { border-color: #9c27b0; }

        /* Playful 3D Button Style */
        button {
            background-color: #9c27b0;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 16px;
            cursor: pointer;
            margin: 6px 0;
            width: 100%;
            box-shadow: 0 5px 0px #6a1b9a;
            transition: all 0.1s ease;
            position: relative;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0px #6a1b9a;
        }
        button.secondary { background-color: #ff9800; box-shadow: 0 5px 0px #e65100; }
        button.secondary:active { box-shadow: 0 1px 0px #e65100; }
        
        button.success { background-color: #4caf50; box-shadow: 0 5px 0px #2e7d32; }
        button.success:active { box-shadow: 0 1px 0px #2e7d32; }

        /* --- THREE-COLUMN GAMEPLAY LAYOUT --- */
        .game-layout {
            display: flex;
            gap: 20px;
            align-items: stretch;
            justify-content: space-between;
        }

        /* Column 1: Scoreboard Left */
        .side-scores {
            flex: 1;
            max-width: 220px;
            background: white;
            border: 4px solid #81c784;
            border-radius: 20px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 6px 0px #81c784;
        }
        .side-scores h3 { margin: 0 0 12px 0; font-size: 1.2rem; color: #2e7d32; text-align: center; border-bottom: 3px dashed #c8e6c9; padding-bottom: 8px; }
        .score-list { list-style: none; padding: 0; margin: 0; font-size: 1rem; }
        .score-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 12px;
            border-radius: 12px;
            margin-bottom: 6px;
            background: #f1f8e9;
            border: 2px solid #dedede;
            font-weight: bold;
            color: #33691e;
        }
        .score-item.me { background: #e3f2fd; border-color: #4fc3f7; color: #0d47a1; font-size: 1.1rem; }

        /* Column 2: Main Play Area Center */
        .center-board {
            flex: 2;
            background: white;
            border: 4px solid #b3e5fc;
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-align: center;
            min-width: 320px;
            box-shadow: 0 8px 0px #b3e5fc;
        }
        .timer { font-size: 2.2rem; font-weight: 900; color: #e53935; margin-bottom: 5px; text-shadow: 1px 1px 0 #fff; }
        
        /* Large Toy Block Numbers */
        .num-container { display: flex; justify-content: center; gap: 12px; margin: 20px 0; }
        .num-box { 
            background: #ffeb3b; 
            color: #ff6f00; 
            font-size: 2.8rem; 
            font-weight: 900; 
            width: 75px; 
            height: 75px; 
            line-height: 67px; 
            border-radius: 18px; 
            border: 4px solid #ffcc00; 
            box-shadow: 0 6px 0px #ffb300;
            cursor: pointer; 
            transition: all 0.1s;
        }
        .num-box:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px #ffb300;
        }

        .input-section { margin: 10px 0; }
        #user-input {
            background-color: #fffde7;
            border: 3px solid #fff59d;
            color: #e65100;
            font-size: 1.6rem;
            height: 55px;
        }

        .feedback { font-weight: 900; margin: 10px 0; font-size: 1.3rem; min-height: 30px; letter-spacing: 0.5px; }
        .answer-box { padding: 15px; background: #e8f5e9; color: #2e7d32; border-radius: 16px; font-weight: 900; font-size: 1.2rem; display: none; border: 3px solid #a5d6a7; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-group button { margin: 0; }
        .profile-badge { font-size: 0.95rem; background: #e0f7fa; color: #006064; padding: 6px 16px; border-radius: 20px; display: inline-block; margin-bottom: 15px; font-weight: bold; border: 2px solid #b2ebf2; }

        /* Column 3: Custom Signs & Actions Pad Right */
        .side-pad {
            flex: 1.2;
            max-width: 280px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            background: white;
            padding: 15px;
            border-radius: 24px;
            border: 4px solid #ffcc80;
            box-shadow: 0 8px 0px #ffcc80;
        }
        .pad-btn {
            width: 100%;
            height: 58px;
            margin: 0;
            padding: 0;
            font-size: 1.5rem;
            background-color: #f1f5f9;
            color: #334155;
            border: none;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 900;
            box-shadow: 0 4px 0px #cbd5e1;
            transition: all 0.1s;
        }
        .pad-btn:active { 
            transform: translateY(3px);
            box-shadow: 0 1px 0px #cbd5e1;
        }
        /* Operator Blue Blocks */
        .pad-btn.op { background-color: #e0f2fe; color: #0284c7; box-shadow: 0 4px 0px #bae6fd; font-size: 1.8rem; }
        .pad-btn.op:active { box-shadow: 0 1px 0px #bae6fd; }
        
        .pad-btn.backspace { background-color: #ffe0b2; color: #e65100; box-shadow: 0 4px 0px #ffb74d; font-size: 1.1rem; }
        .pad-btn.backspace:active { box-shadow: 0 1px 0px #ffb74d; }

        .pad-btn.clear { background-color: #f44336; color: white; box-shadow: 0 4px 0px #b71c1c; font-size: 1.1rem; }
        .pad-btn.clear:active { box-shadow: 0 1px 0px #b71c1c; }

        .pad-btn.action { background-color: #4caf50; color: white; box-shadow: 0 4px 0px #1b5e20; font-size: 1.2rem; grid-column: span 2; margin-top: 4px; }
        .pad-btn.action:active { box-shadow: 0 1px 0px #1b5e20; }

        /* Responsive Flow For Phones */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .app-main-header { font-size: 2.2rem; margin: 5px 0 10px 0; }
            .game-layout { flex-direction: column; }
            .side-scores { max-width: 100%; order: 1; box-shadow: 0 4px 0px #81c784; }
            .center-board { order: 2; box-shadow: 0 5px 0px #b3e5fc; }
            .side-pad { max-width: 100%; order: 3; box-shadow: 0 5px 0px #ffcc80; grid-template-columns: repeat(4, 1fr); }
            .pad-btn.action { grid-column: span 4; }
            .num-box { width: 60px; height: 60px; line-height: 52px; font-size: 2.2rem; }
        }
    </style>
    <!-- Include Google Font for beautiful rounded text -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght=700;900&display=swap" rel="stylesheet">
</head>
<body>

<!-- GLOBAL TOP HEADER TITLE -->
<div class="app-main-header">24 Game</div>

<div class="app-workspace">
    <!-- SCREEN 0: REGISTRATION -->
    <div id="register-screen" class="screen active">
        <div class="centered-panel">
            <h1>Welcome Player!</h1>
            <p>What is your name?</p>
            <input type="text" id="username-input" placeholder="Type your name here...">
            <button class="success" onclick="saveProfile()">Let's Play! 🎉</button>
        </div>
    </div>

    <!-- SCREEN 1: MENU -->
    <div id="menu-screen" class="screen">
        <div class="centered-panel">
            <div class="profile-badge" id="player-tag">Player:</div>
            <h1>Choose Mode</h1>
            <p>Ready to challenge your brain?</p>
            <button onclick="startSoloGame()">Single Player 🌟</button>
            <button class="secondary" onclick="showLobbyMenu()">Play with Friends 🚀</button>
            <button style="background:transparent; color:#7b1fa2; font-size:0.9rem; text-decoration:underline; box-shadow:none; margin-top:10px;" onclick="editProfile()">Change Name</button>
        </div>
    </div>

    <!-- SCREEN 2: LOBBY -->
    <div id="lobby-screen" class="screen">
        <div class="centered-panel">
            <h1>Game Lobby</h1>
            <p>Create or find a room code</p>
            <button onclick="createRoom()">+ Make a New Room</button>
            <div style="margin: 15px 0; font-weight: 900; color: #9c27b0; font-size:1.2rem;">- OR -</div>
            <input type="text" id="room-id-input" placeholder="Enter 4-Digit Code" pattern="\d*" inputmode="numeric">
            <button class="success" onclick="joinRoom()">Join Friend's Room</button>
            <button class="secondary" style="margin-top: 15px;" onclick="showScreen('menu-screen')">Go Back</button>
        </div>
    </div>

    <!-- SCREEN 3: GAME BOARD -->
    <div id="game-screen" class="screen">
        <div class="game-layout">
            
            <!-- LEFT: SCOREBAR COLUMN -->
            <div class="side-scores">
                <h3>🏆 Stars Won</h3>
                <ul class="score-list" id="score-display-list">
                    <li class="score-item me"><span>You</span><span>0</span></li>
                </ul>
            </div>

            <!-- CENTER: PLAY MAT COLUMN -->
            <div class="center-board">
                <div>
                    <h1 id="game-title" style="font-size: 1.5rem; margin:0;">Game Board</h1>
                    <div id="room-display" style="color: #7b1fa2; font-size: 0.9rem; font-weight:bold; margin-bottom: 5px;"></div>
                    <div class="timer" id="timer-display">05:00</div>
                </div>

                <div class="num-container">
                    <div class="num-box" id="n1" onclick="appendPad(this.innerText)">-</div>
                    <div class="num-box" id="n2" onclick="appendPad(this.innerText)">-</div>
                    <div class="num-box" id="n3" onclick="appendPad(this.innerText)">-</div>
                    <div class="num-box" id="n4" onclick="appendPad(this.innerText)">-</div>
                </div>

                <div class="input-section">
                    <input type="text" id="user-input" placeholder="Tap numbers & signs to make 24!" readonly>
                    <div class="feedback" id="feedback-msg"></div>
                    <div class="answer-box" id="answer">
                        Solution: <span id="solution-text"></span>
                        <div style="font-size:0.85rem; font-style:italic; margin-top:5px; font-weight:bold;" id="refresh-countdown"></div>
                    </div>
                </div>

                <div class="btn-group">
                    <button id="next-btn" onclick="getSolvableCombination()">Skip Card ⏭️</button>
                    <button class="secondary" id="reveal-btn" onclick="revealAnswerAndReset()">Show Answer 💡</button>
                </div>
                <button class="secondary" style="font-size:0.95rem; padding:10px; background-color:#757575; box-shadow:0 4px 0 #424242;" onclick="leaveGame()">Exit to Menu</button>
            </div>

            <!-- RIGHT: REARRANGED SIGNS & CONTROLS ONLY -->
            <div class="side-pad">
                <button class="pad-btn op" onclick="appendPad('+')">+</button>
                <button class="pad-btn op" onclick="appendPad('-')">-</button>
                
                <button class="pad-btn op" onclick="appendPad('×')">×</button>
                <button class="pad-btn op" onclick="appendPad('÷')">÷</button>
                
                <button class="pad-btn op" onclick="appendPad('(')">(</button>
                <button class="pad-btn op" onclick="appendPad(')')">)</button>

                <button class="pad-btn backspace" onclick="backspacePad()">Undo ⌫</button>
                <button class="pad-btn clear" onclick="clearPad()">Clear ❌</button>
                
                <button class="pad-btn action" onclick="checkUserAnswer()">Submit ⭐</button>
            </div>

        </div>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyBSpKz3tFMv0SyPGYdSaf-lYTYgzuP3CHw",
        authDomain: "make-24-game.firebaseapp.com",
        databaseURL: "https://make-24-game-default-rtdb.firebaseio.com",
        projectId: "make-24-game",
        storageBucket: "make-24-game.firebasestorage.app",
        messagingSenderId: "269267174455",
        appId: "1:269267174455:web:e70958fbadb2a3db28abb2",
        measurementId: "G-EDKE7XQBTP"
    };
    
    let db = null;
    if (typeof firebaseConfig !== 'undefined' && firebaseConfig.apiKey) {
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
    }

    // --- GAME ENGINE STATE ---
    let currentSolution = "";
    let targetDigits = [];
    let timerInterval = null;
    let refreshInterval = null;
    let timeRemaining = 300; 
    let isMultiplayer = false;
    let currentRoomId = null;
    let myPlayerName = "";
    let soloScore = 0;
    let multiplayerScores = {};

    window.addEventListener('DOMContentLoaded', () => {
        const savedName = localStorage.getItem('make24_username');
        if (savedName) {
            myPlayerName = savedName;
            document.getElementById('player-tag').innerText = `👤 Player: ${myPlayerName}`;
            showScreen('menu-screen');
        }
    });

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function saveProfile() {
        const inputName = document.getElementById('username-input').value.trim();
        if (!inputName) return alert("Please enter a valid name.");
        myPlayerName = inputName;
        localStorage.setItem('make24_username', myPlayerName);
        document.getElementById('player-tag').innerText = `👤 Player: ${myPlayerName}`;
        showScreen('menu-screen');
    }

    function editProfile() {
        document.getElementById('username-input').value = myPlayerName;
        showScreen('register-screen');
    }

    function appendPad(val) {
        document.getElementById('user-input').value += val;
    }
    function clearPad() {
        document.getElementById('user-input').value = "";
    }
    function backspacePad() {
        const inputField = document.getElementById('user-input');
        inputField.value = inputField.value.slice(0, -1);
    }

    // --- LOGIC: PATCHED SOLVER MATRIX ---
    function solve24(numbers, expressions) {
        if (numbers.length === 1) {
            if (Math.abs(numbers[0] - 24) < 0.001) {
                currentSolution = expressions[0];
                return true;
            }
            return false;
        }
        for (let i = 0; i < numbers.length; i++) {
            for (let j = 0; j < numbers.length; j++) {
                if (i === j) continue;
                let nextNums = [], nextExprs = [];
                for (let k = 0; k < numbers.length; k++) {
                    if (k !== i && k !== j) { nextNums.push(numbers[k]); nextExprs.push(expressions[k]); }
                }
                let n1 = numbers[i], n2 = numbers[j];
                let e1 = expressions[i], e2 = expressions[j];

                if (i < j) {
                    nextNums.push(n1 + n2); nextExprs.push(`(${e1} + ${e2})`);
                    if (solve24(nextNums, nextExprs)) return true;
                    nextNums.pop(); nextExprs.pop();
                }
                nextNums.push(n1 - n2); nextExprs.push(`(${e1} - ${e2})`);
                if (solve24(nextNums, nextExprs)) return true;
                nextNums.pop(); nextExprs.pop();
                if (i < j) {
                    nextNums.push(n1 * n2); nextExprs.push(`(${e1} × ${e2})`);
                    if (solve24(nextNums, nextExprs)) return true;
                    nextNums.pop(); nextExprs.pop();
                }
                if (Math.abs(n2) > 0.0001) {
                    nextNums.push(n1 / n2); nextExprs.push(`(${e1} ÷ ${e2})`);
                    if (solve24(nextNums, nextExprs)) return true;
                    nextNums.pop(); nextExprs.pop();
                }
            }
        }
        return false;
    }

    function renderScores() {
        const listContainer = document.getElementById('score-display-list');
        listContainer.innerHTML = "";
        if (!isMultiplayer) {
            listContainer.innerHTML = `<li class="score-item me"><span>${myPlayerName}</span><span>⭐ ${soloScore}</span></li>`;
        } else {
            Object.keys(multiplayerScores).sort((a,b) => multiplayerScores[b] - multiplayerScores[a]).forEach(user => {
                const isMe = user === myPlayerName ? "me" : "";
                listContainer.innerHTML += `<li class="score-item ${isMe}"><span>${user}</span><span>⭐ ${multiplayerScores[user]}</span></li>`;
            });
        }
    }

    function startSoloGame() {
        isMultiplayer = false;
        soloScore = 0;
        document.getElementById('game-title').innerText = "Solo Mode 🌟";
        document.getElementById('room-display').innerText = "";
        document.getElementById('next-btn').style.display = 'inline-block';
        showScreen('game-screen');
        renderScores();
        getSolvableCombination();
    }

    function showLobbyMenu() {
        if (!db) return alert("Firebase setup incomplete.");
        showScreen('lobby-screen');
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeRemaining = 300; 
        updateTimerDisplay();
        timerInterval = setInterval(() => {
            timeRemaining--;
            updateTimerDisplay();
            if (timeRemaining <= 0) {
                clearInterval(timerInterval);
                document.getElementById('feedback-msg').style.color = '#d32f2f';
                document.getElementById('feedback-msg').innerText = "Out of time! Try next card! ⏰";
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        let m = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
        let s = (timeRemaining % 60).toString().padStart(2, '0');
        document.getElementById('timer-display').innerText = `⏱️ ${m}:${s}`;
    }

    function getSolvableCombination() {
        clearInterval(refreshInterval);
        if (isMultiplayer) {
            let digits = [];
            while (true) {
                digits = [Math.floor(Math.random()*10), Math.floor(Math.random()*10), Math.floor(Math.random()*10), Math.floor(Math.random()*10)];
                currentSolution = "";
                if (solve24([...digits], digits.map(d=>d.toString()))) break;
            }
            if (currentSolution.startsWith('(') && currentSolution.endsWith(')')) currentSolution = currentSolution.slice(1, -1);
            db.ref('rooms/' + currentRoomId).update({ digits: digits, solution: currentSolution, winner: null, status: "playing" });
            return;
        }

        while (true) {
            let digits = [Math.floor(Math.random()*10), Math.floor(Math.random()*10), Math.floor(Math.random()*10), Math.floor(Math.random()*10)];
            currentSolution = "";
            if (solve24([...digits], digits.map(d=>d.toString()))) {
                if (currentSolution.startsWith('(') && currentSolution.endsWith(')')) currentSolution = currentSolution.slice(1, -1);
                targetDigits = [...digits];
                setupBoardUI(digits);
                break;
            }
        }
    }

    function setupBoardUI(digits) {
        document.getElementById('n1').innerText = digits[0];
        document.getElementById('n2').innerText = digits[1];
        document.getElementById('n3').innerText = digits[2];
        document.getElementById('n4').innerText = digits[3];
        if (!isMultiplayer) document.getElementById('reveal-btn').style.display = 'inline-block';
        document.getElementById('answer').style.display = 'none';
        clearPad();
        document.getElementById('feedback-msg').innerText = "";
        startTimer();
    }

    function checkUserAnswer() {
        if (timeRemaining <= 0) return;
        const feedback = document.getElementById('feedback-msg');
        const inputRaw = document.getElementById('user-input').value;
        const userDigits = inputRaw.match(/\d/g);

        if (!userDigits || userDigits.length !== 4) {
            feedback.style.color = '#e53935'; feedback.innerText = "Oops! You must use all 4 numbers."; return;
        }
        if ([...targetDigits].sort().join('') !== [...userDigits].map(Number).sort().join('')) {
            feedback.style.color = '#e53935'; feedback.innerText = "Check again! Use only the given numbers."; return;
        }

        let jsEvalString = inputRaw.replace(/×/g, '*').replace(/÷/g, '/');
        try {
            let result = Function(`"use strict"; return (${jsEvalString})`)();
            if (Math.abs(result - 24) < 0.001) {
                if (isMultiplayer) {
                    db.ref('rooms/' + currentRoomId + '/scores/' + myPlayerName).transaction((currentScore) => {
                        return (currentScore || 0) + 1;
                    });
                    db.ref('rooms/' + currentRoomId).update({ winner: myPlayerName });
                } else {
                    feedback.style.color = '#2e7d32';
                    feedback.innerText = "Awesome! Correct! 🎉 +1 Star!";
                    soloScore++;
                    renderScores();
                    clearInterval(timerInterval);
                    setTimeout(getSolvableCombination, 1500);
                }
            } else {
                feedback.style.color = '#e53935'; feedback.innerText = `That equals ${result}, try to make 24!`;
            }
        } catch (e) {
            feedback.style.color = '#e53935'; feedback.innerText = "Math error! Check your brackets ( ).";
        }
    }

    function revealAnswerAndReset() {
        clearInterval(timerInterval);
        document.getElementById('reveal-btn').style.display = 'none';
        document.getElementById('answer').style.display = 'block';
        document.getElementById('solution-text').innerText = currentSolution + " = 24";
        
        let refreshSecs = 10;
        const countdownDisplay = document.getElementById('refresh-countdown');
        countdownDisplay.innerText = `New puzzle in ${refreshSecs} seconds...`;
        
        clearInterval(refreshInterval);
        refreshInterval = setInterval(() => {
            refreshSecs--;
            countdownDisplay.innerText = `New puzzle in ${refreshSecs} seconds...`;
            if (refreshSecs <= 0) {
                clearInterval(refreshInterval);
                getSolvableCombination();
            }
        }, 1000);
    }

    // --- MULTIPLAYER OVERLAY ---
    function createRoom() {
        currentRoomId = Math.floor(1000 + Math.random() * 9000).toString(); 
        isMultiplayer = true;
        multiplayerScores = {};
        multiplayerScores[myPlayerName] = 0;

        db.ref('rooms/' + currentRoomId).set({
            status: "lobby",
            digits: [0,0,0,0],
            solution: "",
            winner: null,
            scores: multiplayerScores
        }).then(() => {
            listenToRoom();
            document.getElementById('game-title').innerText = "Multiplayer Arena 🚀";
            document.getElementById('room-display').innerText = `Room Code: ${currentRoomId} (Host)`;
            document.getElementById('next-btn').style.display = 'inline-block';
            document.getElementById('reveal-btn').style.display = 'none'; 
            showScreen('game-screen');
            getSolvableCombination();
        });
    }

    function joinRoom() {
        let inputCode = document.getElementById('room-id-input').value.trim();
        if (!inputCode) return;
        
        db.ref('rooms/' + inputCode).once('value', snapshot => {
            if (snapshot.exists()) {
                currentRoomId = inputCode;
                isMultiplayer = true;
                db.ref('rooms/' + currentRoomId + '/scores/' + myPlayerName).set(0);
                
                listenToRoom();
                document.getElementById('game-title').innerText = "Multiplayer Race 🏁";
                document.getElementById('room-display').innerText = `Room Code: ${currentRoomId} (Guest)`;
                document.getElementById('next-btn').style.display = 'none'; 
                document.getElementById('reveal-btn').style.display = 'none';
                showScreen('game-screen');
            } else {
                alert("Room not found! Double check the numbers.");
            }
        });
    }

    function listenToRoom() {
        db.ref('rooms/' + currentRoomId).on('value', snapshot => {
            const data = snapshot.val();
            if (!data) return;

            targetDigits = data.digits;
            currentSolution = data.solution;
            if (data.scores) {
                multiplayerScores = data.scores;
                renderScores();
            }

            if (document.getElementById('n1').innerText !== String(targetDigits[0])) {
                setupBoardUI(targetDigits);
            }

            if (data.winner) {
                clearInterval(timerInterval);
                const feedback = document.getElementById('feedback-msg');
                if (data.winner === myPlayerName) {
                    feedback.style.color = '#2e7d32';
                    feedback.innerText = "You Won! 🏆 You got the star!";
                } else {
                    feedback.style.color = '#d32f2f';
                    feedback.innerText = `${data.winner} solved it first!`;
                }
                document.getElementById('answer').style.display = 'block';
                document.getElementById('solution-text').innerText = currentSolution + " = 24";
                document.getElementById('refresh-countdown').innerText = "Waiting for Host to deal a new card...";
            }
        });
    }

    function leaveGame() {
        clearInterval(timerInterval);
        clearInterval(refreshInterval);
        if (isMultiplayer && currentRoomId) {
            db.ref('rooms/' + currentRoomId).off();
        }
        showScreen('menu-screen');
    }
</script>
</body>
</html>
