<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Make 24 Online - Solo & Multiplayer</title>
    <!-- Firebase Legacy SDKs for easy single-file CDN integration -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }
        .card {
            background: white;
            padding: 25px 20px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            width: 100%;
            max-width: 420px;
        }
        .screen { display: none; }
        .screen.active { display: block; }
        
        h1 { color: #333; margin: 0 0 10px 0; font-size: 1.8rem; }
        p { color: #666; font-size: 0.95rem; margin: 5px 0 20px 0; }
        
        .timer { font-size: 1.6rem; font-weight: bold; color: #d32f2f; margin-bottom: 8px; }
        .instructions { font-size: 0.8rem; color: #777; background: #fdf6e2; padding: 8px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #f5e7c4; line-height: 1.3; }
        
        /* Mobile responsive numbers layout */
        .num-container { display: flex; justify-content: space-between; margin-bottom: 25px; gap: 8px; }
        .num-box { background: #f3e5f5; color: #7b1fa2; font-size: 2rem; font-weight: bold; flex: 1; height: 65px; line-height: 65px; border-radius: 10px; border: 2px solid #e1bee7; }
        
        .input-section { margin-bottom: 15px; }
        
        /* Touch friendly form inputs */
        input[type="text"] { width: 100%; padding: 14px; font-size: 1.1rem; border: 2px solid #ddd; border-radius: 10px; outline: none; text-align: center; margin-bottom: 10px; transition: border 0.2s; }
        input[type="text"]:focus { border-color: #7b1fa2; }
        
        /* Responsive, large click-target buttons */
        button { width: 100%; background-color: #7b1fa2; color: white; border: none; padding: 14px 20px; font-size: 1.05rem; font-weight: 600; border-radius: 10px; cursor: pointer; margin: 6px 0; transition: background 0.2s, transform 0.1s; }
        button:active { transform: scale(0.98); }
        button.secondary { background-color: #6c757d; }
        button.success { background-color: #2e7d32; }
        
        /* Utility button wrapping grid */
        .btn-group { display: flex; gap: 8px; margin: 5px 0; }
        .btn-group button { flex: 1; margin: 0; }

        .feedback { font-weight: bold; margin-top: 15px; font-size: 1.05rem; min-height: 24px; }
        .answer-box { margin-top: 20px; padding: 15px; background: #e8f5e9; color: #2e7d32; border-radius: 10px; font-weight: bold; display: none; border: 1px solid #c8e6c9; font-size: 1.05rem; }
        .refresh-text { font-size: 0.85rem; color: #c62828; margin-top: 10px; font-style: italic; }
        
        .profile-badge { font-size: 0.85rem; background: #e0f7fa; color: #006064; padding: 4px 10px; border-radius: 20px; display: inline-block; margin-bottom: 15px; font-weight: 500; }
    </style>
</head>
<body>

<div class="card">
    <!-- SCREEN 0: PLAYER REGISTRATION -->
    <div id="register-screen" class="screen active">
        <h1>Player Profile</h1>
        <p>Please register your info to start playing</p>
        <input type="text" id="username-input" placeholder="Enter Username / Nickname">
        <button class="success" onclick="saveProfile()">Save & Continue</button>
    </div>

    <!-- SCREEN 1: MAIN MENU -->
    <div id="menu-screen" class="screen">
        <div class="profile-badge" id="player-tag">Hello!</div>
        <h1>Make 24 Online</h1>
        <p>Choose your game mode</p>
        <button onclick="startSoloGame()">Solo Mode</button>
        <button class="secondary" onclick="showLobbyMenu()">Multiplayer Room</button>
        <button style="background: transparent; color: #777; font-size: 0.85rem; text-decoration: underline;" onclick="editProfile()">Change Profile Name</button>
    </div>

    <!-- SCREEN 2: MULTIPLAYER LOBBY -->
    <div id="lobby-screen" class="screen">
        <h1>Multiplayer Lobby</h1>
        <p>Create a room or join an existing one</p>
        <button onclick="createRoom()">+ Create New Room</button>
        <div style="margin: 15px 0; color: #888; font-weight: bold;">OR</div>
        <input type="text" id="room-id-input" placeholder="Enter 4-Digit Room Code" pattern="\d*" inputmode="numeric"><br>
        <button class="success" onclick="joinRoom()">Join Room</button>
        <br><br>
        <button class="secondary" onclick="showScreen('menu-screen')">Back to Menu</button>
    </div>

    <!-- SCREEN 3: THE GAME BOARD -->
    <div id="game-screen" class="screen">
        <h1 id="game-title">Make 24</h1>
        <div id="room-display" style="font-weight: bold; color: #555; margin-bottom: 10px; font-size: 0.9rem;"></div>
        <div class="timer" id="timer-display">05:00</div>
        
        <div class="instructions">
            💡 Tap help: Enter <b>*</b> or <b>x</b> for <b>×</b> | Enter <b>/</b> for <b>÷</b>
        </div>
        
        <div class="num-container">
            <div class="num-box" id="n1">-</div>
            <div class="num-box" id="n2">-</div>
            <div class="num-box" id="n3">-</div>
            <div class="num-box" id="n4">-</div>
        </div>

        <div class="input-section" id="user-input-section">
            <input type="text" id="user-input" placeholder="e.g., (5 - 1) * 6">
            <button class="success" onclick="checkUserAnswer()">Submit</button>
        </div>

        <div class="feedback" id="feedback-msg"></div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

        <div class="btn-group">
            <button id="next-btn" onclick="getSolvableCombination()">New Match</button>
            <button class="secondary" id="reveal-btn" onclick="revealAnswerAndReset()">Reveal</button>
        </div>

        <div class="answer-box" id="answer">
            Possible Solution:<br>
            <span id="solution-text"></span>
            <div class="refresh-text" id="refresh-countdown"></div>
        </div>
        <br>
        <button class="secondary" onclick="leaveGame()">Exit to Menu</button>
    </div>
</div>

<script>
    // --- FIREBASE CONFIGURATION ---
    const firebaseConfig = {
        apiKey: "AIzaSyBSpKz3tFMv0SyPGYdSaf-lYTYgzuP3CHw",
        authDomain: "make-24-game.firebaseapp.com",
        databaseURL: "https://make-24-game-default-rtdb.firebaseio.com",
        projectId: "make-24-game",
        storageBucket: "make-24-game.firebasestorage.app",
        messagingSenderId: "269267174455",
        appId: "1:269267174455:web:e70958fbadb2a3db28abb2",
        measurementId: "G-EDKE7XQBTP"
    };
    
    // Initialize Firebase
    let db = null;
    if (typeof firebaseConfig !== 'undefined' && firebaseConfig.apiKey) {
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
    }

    // --- GAME & PLAYER STATE ---
    let currentSolution = "";
    let targetDigits = [];
    let timerInterval = null;
    let refreshInterval = null;
    let timeRemaining = 300; 
    let isMultiplayer = false;
    let currentRoomId = null;
    let myPlayerName = "";

    // Load registered profile from memory if it exists
    window.addEventListener('DOMContentLoaded', () => {
        const inputField = document.getElementById('user-input');
        if(inputField) {
            inputField.addEventListener('input', function() {
                this.value = this.value.replace(/\*/g, '×').replace(/x/g, '×').replace(/X/g, '×').replace(/\//g, '÷');
            });
        }
        
        const savedName = localStorage.getItem('make24_username');
        if (savedName) {
            myPlayerName = savedName;
            document.getElementById('player-tag').innerText = `👤 Player: ${myPlayerName}`;
            showScreen('menu-screen');
        }
    });

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    // --- REGISTRATION LOGIC ---
    function saveProfile() {
        const inputName = document.getElementById('username-input').value.trim();
        if (!inputName) {
            alert("Please enter a valid nickname!");
            return;
        }
        myPlayerName = inputName;
        localStorage.setItem('make24_username', myPlayerName);
        document.getElementById('player-tag').innerText = `👤 Player: ${myPlayerName}`;
        showScreen('menu-screen');
    }

    function editProfile() {
        document.getElementById('username-input').value = myPlayerName;
        showScreen('register-screen');
    }

    // --- MATHEMATICAL SOLVER ENGINE ---
    function solve24(numbers, expressions) {
        if (numbers.length === 1) {
            return Math.abs(numbers[0] - 24) < 0.001;
        }
        for (let i = 0; i < numbers.length; i++) {
            for (let j = 0; j < numbers.length; j++) {
                if (i === j) continue;
                let nextNums = [], nextExprs = [];
                for (let k = 0; k < numbers.length; k++) {
                    if (k !== i && k !== j) { nextNums.push(numbers[k]); nextExprs.push(expressions[k]); }
                }
                let n1 = numbers[i], n2 = numbers[j];
                let e1 = expressions[i], e2 = expressions[j];

                if (i < j) {
                    nextNums.push(n1 + n2); nextExprs.push(`(${e1} + ${e2})`);
                    if (solve24(nextNums, nextExprs)) { currentSolution = nextExprs[nextExprs.length-1]; return true; }
                    nextNums.pop(); nextExprs.pop();
                }
                nextNums.push(n1 - n2); nextExprs.push(`(${e1} - ${e2})`);
                if (solve24(nextNums, nextExprs)) { currentSolution = nextExprs[nextExprs.length-1]; return true; }
                nextNums.pop(); nextExprs.pop();
                if (i < j) {
                    nextNums.push(n1 * n2); nextExprs.push(`(${e1} × ${e2})`);
                    if (solve24(nextNums, nextExprs)) { currentSolution = nextExprs[nextExprs.length-1]; return true; }
                    nextNums.pop(); nextExprs.pop();
                }
                if (Math.abs(n2) > 0.0001) {
                    nextNums.push(n1 / n2); nextExprs.push(`(${e1} ÷ ${e2})`);
                    if (solve24(nextNums, nextExprs)) { currentSolution = nextExprs[nextExprs.length-1]; return true; }
                    nextNums.pop(); nextExprs.pop();
                }
            }
        }
        return false;
    }

    // --- GAME FLOWS ---
    function startSoloGame() {
        isMultiplayer = false;
        currentRoomId = null;
        document.getElementById('game-title').innerText = "Solo Mode";
        document.getElementById('room-display').innerText = "";
        document.getElementById('next-btn').style.display = 'inline-block';
        showScreen('game-screen');
        getSolvableCombination();
    }

    function showLobbyMenu() {
        if (!db) {
            alert("Firebase connection missing. Check connection settings.");
            return;
        }
        showScreen('lobby-screen');
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeRemaining = 300; 
        updateTimerDisplay();
        timerInterval = setInterval(() => {
            timeRemaining--;
            updateTimerDisplay();
            if (timeRemaining <= 0) {
                clearInterval(timerInterval);
                document.getElementById('feedback-msg').style.color = '#d32f2f';
                document.getElementById('feedback-msg').innerText = "Time's up! Try another match.";
                document.getElementById('user-input-section').style.display = 'none';
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        let m = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
        let s = (timeRemaining % 60).toString().padStart(2, '0');
        document.getElementById('timer-display').innerText = `${m}:${s}`;
    }

    function getSolvableCombination() {
        clearInterval(refreshInterval);
        
        if (isMultiplayer) {
            let digits = [];
            while (true) {
                digits = [Math.floor(Math.random()*10), Math.floor(Math.random()*10), Math.floor(Math.random()*10), Math.floor(Math.random()*10)];
                if (solve24([...digits], digits.map(d=>d.toString()))) break;
            }
            if (currentSolution.startsWith('(') && currentSolution.endsWith(')')) currentSolution = currentSolution.slice(1, -1);
            
            db.ref('rooms/' + currentRoomId).update({
                digits: digits,
                solution: currentSolution,
                winner: null,
                status: "playing"
            });
            return;
        }

        while (true) {
            let digits = [Math.floor(Math.random()*10), Math.floor(Math.random()*10), Math.floor(Math.random()*10), Math.floor(Math.random()*10)];
            if (solve24([...digits], digits.map(d=>d.toString()))) {
                if (currentSolution.startsWith('(') && currentSolution.endsWith(')')) currentSolution = currentSolution.slice(1, -1);
                targetDigits = [...digits];
                setupBoardUI(digits);
                break;
            }
        }
    }

    function setupBoardUI(digits) {
        document.getElementById('n1').innerText = digits[0];
        document.getElementById('n2').innerText = digits[1];
        document.getElementById('n3').innerText = digits[2];
        document.getElementById('n4').innerText = digits[3];
        document.getElementById('user-input-section').style.display = 'block';
        if (!isMultiplayer) document.getElementById('reveal-btn').style.display = 'inline-block';
        document.getElementById('answer').style.display = 'none';
        document.getElementById('user-input').value = "";
        document.getElementById('feedback-msg').innerText = "";
        startTimer();
    }

    function checkUserAnswer() {
        if (timeRemaining <= 0) return;
        const feedback = document.getElementById('feedback-msg');
        const inputRaw = document.getElementById('user-input').value;
        const userDigits = inputRaw.match(/\d/g);

        if (!userDigits || userDigits.length !== 4) {
            feedback.style.color = '#d32f2f'; feedback.innerText = "Error: Use exactly 4 digits."; return;
        }
        if ([...targetDigits].sort().join('') !== [...userDigits].map(Number).sort().join('')) {
            feedback.style.color = '#d32f2f'; feedback.innerText = "Error: Must use standard puzzle values."; return;
        }

        let jsEvalString = inputRaw.replace(/×/g, '*').replace(/÷/g, '/');
        try {
            let result = Function(`"use strict"; return (${jsEvalString})`)();
            if (Math.abs(result - 24) < 0.001) {
                if (isMultiplayer) {
                    db.ref('rooms/' + currentRoomId).update({ winner: myPlayerName });
                } else {
                    feedback.style.color = '#2e7d32';
                    feedback.innerText = "Correct! Great job! 🎉";
                    clearInterval(timerInterval);
                    setTimeout(revealAnswerAndReset, 1500);
                }
            } else {
                feedback.style.color = '#d32f2f'; feedback.innerText = `Incorrect: Equals ${result}, not 24.`;
            }
        } catch (e) {
            feedback.style.color = '#d32f2f'; feedback.innerText = "Syntax Error: Check symbols/parentheses.";
        }
    }

    function revealAnswerAndReset() {
        clearInterval(timerInterval);
        document.getElementById('user-input-section').style.display = 'none';
        document.getElementById('reveal-btn').style.display = 'none';
        document.getElementById('answer').style.display = 'block';
        document.getElementById('solution-text').innerText = currentSolution + " = 24";
        
        let refreshSecs = 10;
        const countdownDisplay = document.getElementById('refresh-countdown');
        countdownDisplay.innerText = `Refreshing puzzle in ${refreshSecs}s...`;
        
        clearInterval(refreshInterval);
        refreshInterval = setInterval(() => {
            refreshSecs--;
            countdownDisplay.innerText = `Refreshing puzzle in ${refreshSecs}s...`;
            if (refreshSecs <= 0) {
                clearInterval(refreshInterval);
                getSolvableCombination();
            }
        }, 1000);
    }

    // --- MULTIPLAYER ROOMS INTERACTION ---
    function createRoom() {
        currentRoomId = Math.floor(1000 + Math.random() * 9000).toString(); 
        isMultiplayer = true;
        
        db.ref('rooms/' + currentRoomId).set({
            status: "lobby",
            digits: [0,0,0,0],
            solution: "",
            winner: null
        }).then(() => {
            listenToRoom();
            document.getElementById('game-title').innerText = "Multiplayer Race";
            document.getElementById('room-display').innerText = `Room Code: ${currentRoomId} (Host)`;
            document.getElementById('next-btn').style.display = 'inline-block';
            document.getElementById('reveal-btn').style.display = 'none'; 
            showScreen('game-screen');
            getSolvableCombination();
        });
    }

    function joinRoom() {
        let inputCode = document.getElementById('room-id-input').value.trim();
        if (!inputCode) return;
        
        db.ref('rooms/' + inputCode).once('value', snapshot => {
            if (snapshot.exists()) {
                currentRoomId = inputCode;
                isMultiplayer = true;
                listenToRoom();
                document.getElementById('game-title').innerText = "Multiplayer Race";
                document.getElementById('room-display').innerText = `Room Code: ${currentRoomId} (Guest)`;
                document.getElementById('next-btn').style.display = 'none'; 
                document.getElementById('reveal-btn').style.display = 'none';
                showScreen('game-screen');
            } else {
                alert("Room not found! Confirm the code value.");
            }
        });
    }

    function listenToRoom() {
        db.ref('rooms/' + currentRoomId).on('value', snapshot => {
            const data = snapshot.val();
            if (!data) return;

            targetDigits = data.digits;
            currentSolution = data.solution;

            if (document.getElementById('n1').innerText !== String(targetDigits[0])) {
                setupBoardUI(targetDigits);
            }

            if (data.winner) {
                clearInterval(timerInterval);
                document.getElementById('user-input-section').style.display = 'none';
                const feedback = document.getElementById('feedback-msg');
                
                if (data.winner === myPlayerName) {
                    feedback.style.color = '#2e7d32';
                    feedback.innerText = "🏆 You Won! Pure Speed!";
                } else {
                    feedback.style.color = '#d32f2f';
                    feedback.innerText = `Winner: ${data.winner} beat you to it!`;
                }
                
                document.getElementById('answer').style.display = 'block';
                document.getElementById('solution-text').innerText = currentSolution + " = 24";
                document.getElementById('refresh-countdown').innerText = "Waiting for Host to advance match...";
            }
        });
    }

    function leaveGame() {
        clearInterval(timerInterval);
        clearInterval(refreshInterval);
        if (isMultiplayer && currentRoomId) {
            db.ref('rooms/' + currentRoomId).off();
        }
        showScreen('menu-screen');
    }
</script>

</body>
</html>
